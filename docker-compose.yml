version: '3.8'

services:
  mysql_db:
    image: mysql:8.0
    container_name: classboard_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD:  " "
      MYSQL_DATABASE: db_agenda_metas         # El nombre de tu base de datos MySQL
    ports:
      - "3306:3306"                           # Mapeamos el puerto nativo de MySQL
    volumes:
      - mysql_data:/var/lib/mysql             # Ruta correcta para guardar los datos de MySQL

volumes:
  mysql_data: