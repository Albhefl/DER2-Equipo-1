version: '3.8'

services:
  postgres_db:
    image: postgres:16-alpine
    container_name: classboard_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: tu_contraseña_segura
      POSTGRES_DB: classboard_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: